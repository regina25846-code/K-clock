<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store">
<title>K-Clock</title>
<style>
@font-face { font-family:'KoPubWorld Dotum Light'; src:url('fonts/KoPubWorld Dotum Light.ttf'); }
@font-face { font-family:'KoPubWorld Dotum Medium'; src:url('fonts/KoPubWorld Dotum Medium.ttf'); }
@font-face { font-family:'KoPubWorld Dotum Bold'; src:url('fonts/KoPubWorld Dotum Bold.ttf'); }

* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
body { background:transparent; font-family:'Segoe UI',sans-serif; overflow:hidden; }

#clock-area { width:100%; display:flex; flex-direction:column; align-items:center; cursor:grab; background:transparent; }
#clock-area.dragging { cursor:grabbing; }
#clock-row { height:130px; min-height:130px; display:flex; align-items:center; justify-content:center; width:100%; }

/* 7세그먼트 */
.clock-7seg { display:flex; align-items:center; }
.digit-group { display:flex; gap:3px; }
.seg-digit { position:relative; width:22px; height:40px; }
.seg { position:absolute; background:#b8b8b8; border-radius:1px; transition:opacity 0.05s; }
.seg.off { opacity:0; }
.seg-h{width:16px;height:3px;left:3px} .seg-v{width:3px;height:14px}
.seg-a{top:0} .seg-b{top:3px;right:0} .seg-c{bottom:3px;right:0}
.seg-d{bottom:0} .seg-e{bottom:3px;left:0} .seg-f{top:3px;left:0} .seg-g{top:18px}
.colon7{display:flex;flex-direction:column;justify-content:center;gap:8px;padding:0 5px 3px}
.dot{width:4px;height:4px;border-radius:50%;background:#b8b8b8}

#text-clock { font-size:52px; color:#b8b8b8; letter-spacing:2px; font-weight:300; line-height:1; display:none; white-space:nowrap; }

/* 패널 */
.panel { width:300px; background:rgba(0,0,0,0.5); border-radius:0 0 10px 10px; padding:10px 14px; position:relative; display:none; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
.panel.open { display:block; }
.panel-title { font-size:14px; color:rgba(184,184,184,0.9); font-weight:600; margin-bottom:10px; }
.close-panel { position:absolute; top:8px; right:10px; color:rgba(184,184,184,0.5); font-size:13px; background:none; border:none; cursor:pointer; }

/* 알람 */
.alarm-row { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
.alarm-row input[type=time] { width:100px; flex-shrink:0; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:5px; color:#b8b8b8; padding:4px 6px; font-size:12px; outline:none; font-family:inherit; }
.alarm-row input[type=text] { flex:1; min-width:0; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:5px; color:#b8b8b8; padding:4px 6px; font-size:12px; outline:none; font-family:inherit; }
.btn-add { flex-shrink:0; width:36px; padding:5px 0; background:rgba(255,255,255,0.10); color:#b8b8b8; border:1px solid rgba(255,255,255,0.15); border-radius:5px; font-size:11px; cursor:pointer; text-align:center; }
.btn-repeat { flex-shrink:0; width:26px; height:26px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); border-radius:5px; cursor:pointer; color:rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center; padding:0; }
.btn-repeat.active { color:#4a9; border-color:#4a9; }
.alarm-repeat-icon { color:#4a9; display:inline-flex; align-items:center; margin-left:3px; vertical-align:middle; }
.alarm-list { display:flex; flex-direction:column; gap:4px; }
.alarm-item { display:flex; align-items:center; justify-content:space-between; padding:5px 2px; font-size:12px; color:#b8b8b8; border-bottom:1px solid rgba(255,255,255,0.08); gap:6px; }
.alarm-item .alarm-label { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.alarm-toggle { width:26px; height:14px; background:#333; border-radius:7px; position:relative; cursor:pointer; flex-shrink:0; }
.alarm-toggle::after { content:''; position:absolute; width:10px; height:10px; background:#fff; border-radius:50%; top:2px; left:2px; transition:left 0.15s; }
.alarm-toggle.on { background:#4a9; }
.alarm-toggle.on::after { left:14px; }
.alarm-del { background:none; border:none; color:rgba(255,80,80,0.6); cursor:pointer; font-size:12px; padding:0 2px; flex-shrink:0; }
.empty-msg { font-size:11px; color:#777; padding:4px 0; }

/* 카운트다운 */
.cd-row { display:flex; align-items:center; gap:4px; margin-bottom:8px; justify-content:center; }
.cd-row input[type=number] { width:44px; text-align:center; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:5px; color:#b8b8b8; padding:4px; font-size:12px; outline:none; }
.cd-row span { color:#555; }
#cd-display { font-size:22px; color:#b8b8b8; text-align:center; margin:8px 0; letter-spacing:2px; font-family:'Consolas',monospace; font-weight:300; }
.cd-btns { display:flex; gap:5px; justify-content:center; }
.cd-btns button { padding:4px 10px; border:1px solid rgba(255,255,255,0.15); border-radius:5px; font-size:11px; cursor:pointer; white-space:nowrap; background:rgba(255,255,255,0.08); color:#b8b8b8; }

/* 설정 */
.setting-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.08); font-size:12px; color:#b8b8b8; }
.setting-row:last-child { border-bottom:none; }
.toggle { width:30px; height:16px; background:#4a9; border-radius:8px; position:relative; cursor:pointer; flex-shrink:0; }
.toggle::after { content:''; position:absolute; width:12px; height:12px; background:#fff; border-radius:50%; top:2px; left:16px; transition:left 0.15s; }
.toggle.off::after { left:2px; }
.toggle.off { background:#333; }
select { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:5px; color:#b8b8b8; padding:3px 6px; font-size:11px; outline:none; cursor:pointer; }
select option { background:#1e1e1e; color:#b8b8b8; }
.color-btn { padding:3px 9px; border:1px solid rgba(255,255,255,0.18); border-radius:4px; font-size:11px; cursor:pointer; background:transparent; color:#b8b8b8; }
.color-btn.active { border-color:#aaa; background:rgba(255,255,255,0.15); }

/* 우클릭 메뉴 */
#ctx-menu { position:fixed; background:rgba(22,22,22,0.97); border:1px solid rgba(255,255,255,0.09); border-radius:9px; padding:5px 0; min-width:130px; box-shadow:0 6px 20px rgba(0,0,0,0.7); display:none; z-index:1000; }
.menu-item { padding:7px 14px; font-size:14px; color:rgba(255,255,255,0.7); cursor:pointer; display:flex; align-items:center; gap:8px; }
.menu-item svg { flex-shrink:0; opacity:0.75; }
.menu-item:hover { background:rgba(255,255,255,0.07); }
.menu-sep { height:1px; background:rgba(255,255,255,0.07); margin:3px 0; }
.menu-item.danger { color:rgba(255,90,90,1); }

@keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.15} }
.flashing { animation:flash 0.5s ease-in-out infinite; }
</style>
</head>
<body>

<div id="clock-area">
  <div id="clock-row">
    <div class="clock-7seg" id="seg-wrap">
      <div class="digit-group" id="dh"></div>
      <div class="colon7" id="colon1"><div class="dot"></div><div class="dot"></div></div>
      <div class="digit-group" id="dm"></div>
      <div class="colon7" id="colon2"><div class="dot"></div><div class="dot"></div></div>
      <div class="digit-group" id="ds"></div>
    </div>
    <div id="text-clock">00:00:00</div>
  </div>

  <div class="panel" id="panel-alarm">
    <div class="panel-title">알람</div>
    <button class="close-panel" onclick="closePanel()">✕</button>
    <div class="alarm-row">
      <input type="time" id="alarm-time" value="07:00">
      <input type="text" id="alarm-name" placeholder="이름">
      <button class="btn-repeat" id="btn-repeat" onclick="toggleRepeatBtn()" title="매일 반복"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>
      <button class="btn-add" onclick="addAlarm()">추가</button>
    </div>
    <div class="alarm-list" id="alarm-list"></div>
    <div class="empty-msg" id="alarm-empty">등록된 알람 없음</div>
  </div>

  <div class="panel" id="panel-countdown">
    <div class="panel-title">카운트다운</div>
    <button class="close-panel" onclick="closePanel()">✕</button>
    <div class="cd-row">
      <input type="number" id="cd-h" placeholder="시" min=0 max=23>
      <span>:</span>
      <input type="number" id="cd-m" placeholder="분" min=0 max=59>
      <span>:</span>
      <input type="number" id="cd-s" placeholder="초" min=0 max=59>
    </div>
    <div id="cd-display">00:00:00</div>
    <div class="cd-btns">
      <button onclick="cdStart()">시작</button>
      <button onclick="cdPause()">일시정지</button>
      <button onclick="cdReset()">초기화</button>
    </div>
  </div>

  <div class="panel" id="panel-settings">
    <div class="panel-title">설정</div>
    <button class="close-panel" onclick="closePanel()">✕</button>
    <div class="setting-row"><span>시작 시 실행</span><div class="toggle off" id="tog-auto" onclick="toggleAutostart()"></div></div>
    <div class="setting-row"><span>항상 위</span><div class="toggle" id="tog-pin" onclick="toggleAlwaysOnTop()"></div></div>
    <div class="setting-row"><span>초 표시</span><div class="toggle" id="tog-sec" onclick="toggleSec()"></div></div>
    <div class="setting-row">
      <span>스타일/폰트</span>
      <select id="style-select" onchange="changeStyle(this.value)">
        <option value="7seg">7세그먼트 (영문/숫자)</option>
        <option value="Inter,Pretendard,sans-serif">Inter + Pretendard</option>
        <option value="'Malgun Gothic','맑은 고딕',sans-serif">맑은 고딕</option>
        <option value="Gulim,굴림,sans-serif">굴림</option>
        <option value="'Nanum Gothic','나눔고딕',sans-serif">나눔고딕</option>
        <option value="Arial,sans-serif">Arial</option>
        <option value="'KoPubWorld Dotum Light',sans-serif">KoPubWorld Light</option>
        <option value="'KoPubWorld Dotum Medium',sans-serif">KoPubWorld Medium</option>
        <option value="'KoPubWorld Dotum Bold',sans-serif" selected>KoPubWorld Bold</option>
      </select>
    </div>
    <div class="setting-row">
      <span>크기</span>
      <div style="display:flex;align-items:center;gap:5px">
        <input type="range" min=10 max=100 value=70 id="size-slider" style="width:70px;accent-color:#888" oninput="previewSize(this.value)" onchange="changeSize(this.value)">
        <span id="size-val" style="font-size:11px;min-width:22px;text-align:right">70</span>
      </div>
    </div>
    <div class="setting-row">
      <span>밝기</span>
      <div style="display:flex;align-items:center;gap:5px">
        <input type="range" min=0 max=255 value=220 id="brightness-slider" style="width:70px;accent-color:#888" oninput="changeBrightness(this.value);document.getElementById('bright-val').textContent=this.value">
        <span id="bright-val" style="font-size:11px;min-width:22px;text-align:right">220</span>
      </div>
    </div>
    <div class="setting-row">
      <span>패널 투명도</span>
      <div style="display:flex;align-items:center;gap:5px">
        <input type="range" min=0 max=100 value=50 id="panel-opacity-slider" style="width:70px;accent-color:#888" oninput="changePanelOpacity(this.value);document.getElementById('panel-op-val').textContent=this.value">
        <span id="panel-op-val" style="font-size:11px;min-width:22px;text-align:right">50</span>
      </div>
    </div>
    <div class="setting-row">
      <span>패널 색상</span>
      <div style="display:flex;gap:5px">
        <button class="color-btn active" id="btn-black" onclick="changePanelColor('black')">검정</button>
        <button class="color-btn" id="btn-white" onclick="changePanelColor('white')">흰색</button>
      </div>
    </div>
  </div>
</div>

<div id="ctx-menu">
  <div class="menu-item" onclick="openPanel('alarm')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><line x1="12" y1="2" x2="12" y2="4"/></svg> 알람</div>
  <div class="menu-item" onclick="openPanel('countdown')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 카운트다운</div>
  <div class="menu-item" onclick="openPanel('settings')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> 설정</div>
  <div class="menu-sep"></div>
  <div class="menu-item danger" onclick="closeApp()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> 종료</div>
</div>

// ── 7세그먼트 ──
const SEGS={0:'abcdef',1:'bc',2:'abdeg',3:'abcdg',4:'bcfg',5:'acdfg',6:'acdefg',7:'abc',8:'abcdefg',9:'abcdfg'};
const SC={a:'seg seg-h seg-a',b:'seg seg-v seg-b',c:'seg seg-v seg-c',d:'seg seg-h seg-d',e:'seg seg-v seg-e',f:'seg seg-v seg-f',g:'seg seg-h seg-g'};
function md(){const el=document.createElement('div');el.className='seg-digit';'abcdefg'.split('').forEach(s=>{const sg=document.createElement('div');sg.className=SC[s]+' off';sg.dataset.seg=s;el.appendChild(sg);});return el;}
function mp(id){const c=document.getElementById(id);const d1=md(),d2=md();c.appendChild(d1);c.appendChild(d2);return[d1,d2];}
function sd(el,n){const on=SEGS[n]||'';el.querySelectorAll('.seg').forEach(s=>s.classList.toggle('off',!on.includes(s.dataset.seg)));}
function sn(p,n){const s=String(n).padStart(2,'0');sd(p[0],+s[0]);sd(p[1],+s[1]);}
const ph=mp('dh'),pm=mp('dm'),ps=mp('ds');

let showSec=true, brightness=220, panelColor='black', panelOpacity=0.5;
const alarmAudio=new Audio('sounds/alarm.wav');
alarmAudio.volume=0.6;
const txtClock=document.getElementById('text-clock');
const alarms=[];
let flashTimer=null;
let repeatMode=false;
let sizeDebounce=null;
let lockedPos=null;
function toggleRepeatBtn(){
  repeatMode=!repeatMode;
  document.getElementById('btn-repeat').classList.toggle('active',repeatMode);
}

function upd(){
  const n=new Date();
  sn(ph,n.getHours());sn(pm,n.getMinutes());
  if(showSec) sn(ps,n.getSeconds());
  const h=String(n.getHours()).padStart(2,'0');
  const mi=String(n.getMinutes()).padStart(2,'0');
  const sc=String(n.getSeconds()).padStart(2,'0');
  txtClock.textContent=showSec?`${h}:${mi}:${sc}`:`${h}:${mi}`;
  const hm=`${h}:${mi}`;
  alarms.forEach(a=>{if(a.enabled&&a.t===hm&&n.getSeconds()===0){triggerAlarm();if(!a.repeat){a.enabled=false;saveAlarms();renderAlarms();}}});
}
setInterval(upd,1000);upd();
changeStyle("'KoPubWorld Dotum Bold',sans-serif");
changeSize(70);
changeBrightness(220);

// 자동 시작 — OS 미등록 시 자동으로 등록 후 켜짐 표시
invoke('get_autostart').then(on=>{
  const tog=document.getElementById('tog-auto');
  if(on){
    tog.classList.remove('off');
  } else {
    invoke('set_autostart',{enabled:true});
    tog.classList.remove('off');
  }
});

function adjustHeight(){
  const h=document.getElementById('clock-area').offsetHeight;
  invoke('set_window_height',{height:h});
}

function toggleSec(){
  const tog=document.getElementById('tog-sec');
  tog.classList.toggle('off');
  showSec=!tog.classList.contains('off');
  document.getElementById('ds').style.display=showSec?'flex':'none';
  document.getElementById('colon2').style.display=showSec?'flex':'none';
  upd();
}

async function toggleAutostart(){
  const tog=document.getElementById('tog-auto');
  tog.classList.toggle('off');
  const on=!tog.classList.contains('off');
  await invoke('set_autostart',{enabled:on});
}

function toggleAlwaysOnTop(){
  const tog=document.getElementById('tog-pin');
  tog.classList.toggle('off');
  const on=!tog.classList.contains('off');
  invoke('set_always_on_top',{on_top:on});
}

async function openPanel(name){
  hideMenu();
  if(!lockedPos){
    const pos=await invoke('get_window_pos');
    const cx=pos[0]+Math.round(window.innerWidth/2);
    lockedPos={x:pos[0],y:pos[1],cx:cx};
  }
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.getElementById('panel-'+name).classList.add('open');
  setTimeout(adjustHeight,10);
}
function closePanel(){
  lockedPos=null;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  setTimeout(adjustHeight,10);
}

function closeInfo(){
  const d=document.getElementById('info-dialog');
  if(d){ d.remove(); setTimeout(adjustHeight,10); }
}
async function showInfo(){
  hideMenu();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  if(window.__TAURI__){
    const { WebviewWindow } = window.__TAURI__.webviewWindow;
    const existing = WebviewWindow.getByLabel('about');
    if(existing){ await existing.setFocus(); return; }
    new WebviewWindow('about',{
      url: `about.html?v=${APP_VERSION}`,
      title: '프로그램 정보',
      width: 320,
      height: 360,
      resizable: false,
      center: true,
      decorations: false,
      transparent: true,
      alwaysOnTop: true,
      skipTaskbar: true,
    });
  }
}

function changeStyle(v){
  const seg=document.getElementById('seg-wrap');
  if(v==='7seg'){ seg.style.display='flex'; txtClock.style.display='none'; }
  else { seg.style.display='none'; txtClock.style.display='block'; txtClock.style.fontFamily=v; }
}

function previewSize(v){
  txtClock.style.fontSize=v+'px';
  const scale=v/40;
  const sw=document.getElementById('seg-wrap');
  sw.style.transform=`scale(${scale})`;
  sw.style.transformOrigin='center';
  document.getElementById('size-val').textContent=v;
}
async function changeSize(v){
  previewSize(v);
  const w=Math.max(300, Math.round(v*5.8)+40);
  const totalH=document.getElementById('clock-area').offsetHeight;
  await invoke('set_window_size',{width:w,height:totalH});
  if(lockedPos){
    const newX=Math.max(0, lockedPos.cx - Math.round(w/2));
    await invoke('set_window_pos',{x:newX,y:lockedPos.y});
  }
}

function changeBrightness(v){
  brightness=Math.round(Number(v));
  const hex=brightness.toString(16).padStart(2,'0');
  const c='#'+hex+hex+hex;
  document.getElementById('seg-wrap').querySelectorAll('.seg,.dot').forEach(s=>s.style.background=c);
  txtClock.style.color=c;
  document.querySelectorAll('.panel-title,.setting-row span,.alarm-item,.empty-msg,#cd-display,.cd-btns button,.alarm-row input,.btn-add,.cd-row input,.cd-row span').forEach(el=>el.style.color=c);
  document.querySelectorAll('.close-panel').forEach(el=>el.style.color=c+'88');
}

// ── 알람 ──
function triggerAlarm(){
  if(flashTimer) return;
  const cr=document.getElementById('clock-area');
  cr.classList.add('flashing');
  alarmAudio.currentTime=0;
  alarmAudio.loop=true;
  alarmAudio.play().catch(()=>{});
  flashTimer=setTimeout(stopAlarm, 30000);
}
function stopAlarm(){
  if(!flashTimer) return;
  clearTimeout(flashTimer); flashTimer=null;
  document.getElementById('clock-area').classList.remove('flashing');
  alarmAudio.pause(); alarmAudio.currentTime=0;
}
function saveAlarms(){ localStorage.setItem('alarms',JSON.stringify(alarms)); }
function addAlarm(){
  const t=document.getElementById('alarm-time').value;
  const name=document.getElementById('alarm-name').value.trim()||'알람';
  if(!t) return;
  alarms.push({id:Date.now(),t,name,enabled:true,repeat:repeatMode});
  document.getElementById('alarm-name').value='';
  repeatMode=false;
  document.getElementById('btn-repeat').classList.remove('active');
  saveAlarms();
  renderAlarms();
}
function toggleAlarm(id){ const a=alarms.find(x=>x.id===id); if(a) a.enabled=!a.enabled; saveAlarms(); renderAlarms(); }
function removeAlarm(id){ alarms.splice(alarms.findIndex(a=>a.id===id),1); saveAlarms(); renderAlarms(); }
function renderAlarms(){
  const list=document.getElementById('alarm-list');
  const empty=document.getElementById('alarm-empty');
  list.innerHTML='';
  if(!alarms.length){empty.style.display='block';return;}
  empty.style.display='none';
  const hex=brightness.toString(16).padStart(2,'0');
  const c='#'+hex+hex+hex;
  alarms.forEach(a=>{
    const div=document.createElement('div');
    div.className='alarm-item';
    div.style.color=c;
    const repeatIcon=a.repeat?`<span class="alarm-repeat-icon"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></span>`:'';
    div.innerHTML=`<span class="alarm-label">${a.t} ${a.name}${repeatIcon}</span><div class="alarm-toggle ${a.enabled?'on':''}" onclick="toggleAlarm(${a.id})"></div><button class="alarm-del" onclick="removeAlarm(${a.id})">✕</button>`;
    list.appendChild(div);
  });
}

// ── 카운트다운 ──
let cdRemain=0,cdTimer=null,cdRunning=false;
function cdStart(){
  if(!cdRunning&&cdRemain===0){
    const h=parseInt(document.getElementById('cd-h').value)||0;
    const m=parseInt(document.getElementById('cd-m').value)||0;
    const s=parseInt(document.getElementById('cd-s').value)||0;
    cdRemain=h*3600+m*60+s;
  }
  if(!cdRemain) return;
  cdRunning=true; clearInterval(cdTimer);
  cdTimer=setInterval(()=>{ if(cdRemain<=0){clearInterval(cdTimer);cdRunning=false;triggerAlarm();return;} cdRemain--; renderCd(); },1000);
}
function cdPause(){cdRunning=false;clearInterval(cdTimer);}
function cdReset(){cdPause();cdRemain=0;document.getElementById('cd-display').textContent='00:00:00';}
function renderCd(){
  const h=Math.floor(cdRemain/3600),m=Math.floor((cdRemain%3600)/60),s=cdRemain%60;
  document.getElementById('cd-display').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── 드래그 (Tauri) ──
document.getElementById('clock-row').addEventListener('click',function(){
  if(flashTimer) stopAlarm();
});
const clockArea=document.getElementById('clock-area');
let _mdPos=null,_lastMdTime=0,_dragStarted=false;
clockArea.addEventListener('mousedown',function(e){
  if(e.button!==0) return;
  if(flashTimer) return;
  if(e.target.closest('button,input,select,.toggle,.alarm-toggle,.panel,#ctx-menu,#info-dialog')) return;
  const now=Date.now();
  if(now-_lastMdTime<350){
    _lastMdTime=0; _mdPos=null;
    const inv=255-brightness;
    changeBrightness(inv);
    document.getElementById('brightness-slider').value=inv;
    document.getElementById('bright-val').textContent=inv;
    e.preventDefault(); return;
  }
  _lastMdTime=now; _mdPos={x:e.clientX,y:e.clientY}; _dragStarted=false;
  e.preventDefault();
});
clockArea.addEventListener('mousemove',function(e){
  if(!_mdPos||_dragStarted) return;
  if(Math.abs(e.clientX-_mdPos.x)>3||Math.abs(e.clientY-_mdPos.y)>3){
    _dragStarted=true; _mdPos=null;
    invoke('start_dragging');
  }
});
clockArea.addEventListener('mouseup',function(){ _mdPos=null; _dragStarted=false; });

// ── 우클릭 메뉴 ──
const menu=document.getElementById('ctx-menu');
clockArea.addEventListener('contextmenu',async function(e){
  e.preventDefault();
  menu.style.visibility='hidden';
  menu.style.display='block';
  menu.style.top='-9999px';
  menu.style.left='0px';
  const menuH=menu.offsetHeight;
  const menuW=Math.max(menu.offsetWidth||0, 130);
  menu.style.display='none';
  menu.style.visibility='';
  const winW=window.innerWidth;
  const my=e.clientY;
  const mx=Math.min(e.clientX, winW-menuW-4);
  const neededW=Math.max(winW, mx+menuW+4);
  const neededH=my+menuH+4;
  await invoke('set_window_size',{width:neededW,height:neededH});
  await new Promise(r=>setTimeout(r,60));
  menu.style.left=mx+'px';
  menu.style.top=my+'px';
  menu.style.display='block';
});
document.addEventListener('mousedown',function(e){ if(e.button!==0) return; if(!e.target.closest('#ctx-menu')) hideMenu(); });
function hideMenu(){
  menu.style.display='none';
  if(!document.querySelector('.panel.open')) setTimeout(adjustHeight,10);
}
function closeApp(){ hideMenu(); invoke('close_app'); }

function updatePanelBg(){
  const rgb=panelColor==='black'?'0,0,0':'255,255,255';
  document.querySelectorAll('.panel').forEach(p=>p.style.background=`rgba(${rgb},${panelOpacity})`);
}
function changePanelOpacity(v){
  panelOpacity=v/100;
  updatePanelBg();
  localStorage.setItem('panelOpacity',v);
}
function changePanelColor(c){
  panelColor=c;
  document.getElementById('btn-black').classList.toggle('active',c==='black');
  document.getElementById('btn-white').classList.toggle('active',c==='white');
  updatePanelBg();
  localStorage.setItem('panelColor',c);
}

// 슬라이더 max 강제 설정 (캐시 무효화)
(function(){
  const sl=document.getElementById('size-slider');
  sl.max=100;
  if(parseInt(sl.value)>100){ sl.value=100; document.getElementById('size-val').textContent=100; }
})();

// 알람 복원
(function(){
  try{
    const saved=localStorage.getItem('alarms');
    if(saved){ const arr=JSON.parse(saved); arr.forEach(a=>alarms.push(a)); renderAlarms(); }
  }catch(e){}
})();

// 설정 복원
(function(){
  const c=localStorage.getItem('panelColor')||'black';
  const op=parseInt(localStorage.getItem('panelOpacity')||'50');
  panelColor=c; panelOpacity=op/100;
  document.getElementById('panel-opacity-slider').value=op;
  document.getElementById('panel-op-val').textContent=op;
  document.getElementById('btn-black').classList.toggle('active',c==='black');
  document.getElementById('btn-white').classList.toggle('active',c==='white');
  updatePanelBg();
})();
</script>
