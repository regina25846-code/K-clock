<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

  body {
    background: transparent;
    font-family: 'Segoe UI', '맑은 고딕', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #app {
    width: 100%;
    height: 100%;
    background: rgba(10, 10, 10, 0.88);
    border: 1px solid rgba(224, 51, 51, 0.3);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    backdrop-filter: blur(4px);
  }

  /* 드래그 핸들 */
  #drag-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    cursor: move;
    -webkit-app-region: drag;
    border-radius: 12px 12px 0 0;
  }

  /* 상단 버튼 */
  #top-btns {
    position: absolute;
    top: 6px; right: 10px;
    display: flex; gap: 6px;
    -webkit-app-region: no-drag;
  }
  .top-btn {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 8px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.6;
    transition: opacity 0.15s;
  }
  .top-btn:hover { opacity: 1; }
  #btn-pin { background: #e03333; color: #fff; }
  #btn-pin.pinned { background: #ff6b6b; }
  #btn-min { background: #555; color: #aaa; }
  #btn-close { background: #333; color: #888; }

  /* 시계 */
  #clock-wrap {
    display: flex;
    align-items: baseline;
    gap: 2px;
    padding: 8px 20px;
  }

  .digit-group {
    display: flex;
    gap: 3px;
  }

  /* CSS 7세그먼트 */
  .seg-digit {
    position: relative;
    width: 28px;
    height: 50px;
  }

  .seg {
    position: absolute;
    background: #e03333;
    border-radius: 2px;
    transition: opacity 0.05s;
  }
  .seg.off { opacity: 0.08; }

  /* 가로 세그먼트 */
  .seg-h { width: 20px; height: 4px; left: 4px; }
  /* 세로 세그먼트 */
  .seg-v { width: 4px; height: 18px; }

  .seg-a { top: 0px; }
  .seg-b { top: 4px; right: 0; }
  .seg-c { bottom: 4px; right: 0; }
  .seg-d { bottom: 0px; }
  .seg-e { bottom: 4px; left: 0; }
  .seg-f { top: 4px; left: 0; }
  .seg-g { top: 23px; }

  /* 콜론 */
  .colon {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
    padding: 0 4px;
    padding-bottom: 4px;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #e03333;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  /* 날짜 */
  #date-line {
    font-size: 11px;
    color: rgba(224, 51, 51, 0.7);
    letter-spacing: 1px;
    margin-top: -4px;
    margin-bottom: 4px;
  }

  /* 탭 */
  #tabs {
    display: flex;
    gap: 0;
    border-top: 1px solid rgba(255,255,255,0.05);
    width: 100%;
  }
  .tab-btn {
    flex: 1;
    padding: 5px 0;
    background: none;
    border: none;
    color: rgba(255,255,255,0.35);
    font-size: 10px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    font-family: '맑은 고딕', sans-serif;
  }
  .tab-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.04); }
  .tab-btn.active { color: #e03333; border-bottom: 2px solid #e03333; }

  /* 탭 패널 */
  .tab-panel { display: none; width: 100%; padding: 10px 16px; }
  .tab-panel.active { display: block; }

  /* 알람 */
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  input[type="time"], input[type="text"] {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #fff;
    padding: 4px 8px;
    font-size: 12px;
    outline: none;
    font-family: '맑은 고딕', sans-serif;
  }
  input[type="time"]:focus, input[type="text"]:focus {
    border-color: rgba(224,51,51,0.6);
  }
  .btn-sm {
    padding: 4px 12px;
    border: none;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: '맑은 고딕', sans-serif;
  }
  .btn-red { background: #e03333; color: #fff; }
  .btn-red:hover { background: #c72a2a; }
  .btn-gray { background: rgba(255,255,255,0.1); color: #aaa; }
  .btn-gray:hover { background: rgba(255,255,255,0.18); }

  #alarm-list { max-height: 60px; overflow-y: auto; }
  .alarm-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 3px 0;
    font-size: 11px; color: #ccc;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .alarm-item .del { color: #e03333; cursor: pointer; font-size: 12px; }
  .alarm-item .del:hover { color: #ff6b6b; }

  /* 카운트다운 */
  #countdown-display {
    font-size: 22px;
    color: #e03333;
    font-weight: 700;
    text-align: center;
    margin: 6px 0;
    letter-spacing: 2px;
    font-family: 'Consolas', monospace;
  }
  .cd-btns { display: flex; gap: 6px; justify-content: center; }

  /* 설정 */
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 12px; color: #ccc;
  }
  .toggle {
    width: 32px; height: 18px;
    background: #333;
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on { background: #e03333; }
  .toggle::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .toggle.on::after { left: 16px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(224,51,51,0.4); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="drag-bar"></div>
  <div id="top-btns">
    <button class="top-btn pinned" id="btn-pin" title="항상 위">📌</button>
    <button class="top-btn" id="btn-min" title="최소화">–</button>
    <button class="top-btn" id="btn-close" title="닫기">✕</button>
  </div>

  <!-- 시계 -->
  <div id="clock-wrap">
    <div class="digit-group" id="dg-hh"></div>
    <div class="colon"><div class="dot"></div><div class="dot"></div></div>
    <div class="digit-group" id="dg-mm"></div>
    <div class="colon"><div class="dot"></div><div class="dot"></div></div>
    <div class="digit-group" id="dg-ss"></div>
  </div>
  <div id="date-line"></div>

  <!-- 탭 -->
  <div id="tabs">
    <button class="tab-btn active" data-tab="alarm">⏰ 알람</button>
    <button class="tab-btn" data-tab="countdown">⏱ 카운트다운</button>
    <button class="tab-btn" data-tab="settings">⚙ 설정</button>
  </div>

  <!-- 알람 패널 -->
  <div class="tab-panel active" id="panel-alarm">
    <div class="row">
      <input type="time" id="alarm-time" value="07:00">
      <input type="text" id="alarm-label" placeholder="알람 이름" style="flex:1">
      <button class="btn-sm btn-red" onclick="addAlarm()">추가</button>
    </div>
    <div id="alarm-list"></div>
  </div>

  <!-- 카운트다운 패널 -->
  <div class="tab-panel" id="panel-countdown">
    <div class="row" style="justify-content:center;gap:4px">
      <input type="text" id="cd-h" placeholder="시" style="width:40px;text-align:center">
      <span style="color:#666">:</span>
      <input type="text" id="cd-m" placeholder="분" style="width:40px;text-align:center">
      <span style="color:#666">:</span>
      <input type="text" id="cd-s" placeholder="초" style="width:40px;text-align:center">
    </div>
    <div id="countdown-display">00:00:00</div>
    <div class="cd-btns">
      <button class="btn-sm btn-red" onclick="startCountdown()">시작</button>
      <button class="btn-sm btn-gray" onclick="pauseCountdown()">일시정지</button>
      <button class="btn-sm btn-gray" onclick="resetCountdown()">초기화</button>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div class="tab-panel" id="panel-settings">
    <div class="setting-row">
      <span>항상 위</span>
      <div class="toggle on" id="toggle-pin" onclick="togglePin()"></div>
    </div>
    <div class="setting-row">
      <span>초 표시</span>
      <div class="toggle on" id="toggle-sec" onclick="toggleSec()"></div>
    </div>
    <div class="setting-row">
      <span>배경 불투명도</span>
      <input type="range" min="20" max="100" value="88" id="opacity-slider"
        style="width:100px;accent-color:#e03333"
        oninput="setOpacity(this.value)">
    </div>
  </div>
</div>

<script>
const invoke = (...args) => window.__TAURI__?.core?.invoke(...args) ?? Promise.resolve();
const listen = (event, cb) => window.__TAURI__?.event?.listen(event, cb);
const notify = (title, body) => invoke('show_notification', { title, body });

// 자동업데이트 알림
listen?.('update-available', (e) => {
  const bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a3a1a;border-top:1px solid #2d6a2d;padding:5px 10px;font-size:11px;color:#7ec87e;display:flex;align-items:center;gap:8px;z-index:9998';
  bar.innerHTML = `<span style="flex:1">🎉 v${e.payload} 업데이트 준비</span><button onclick="window.location.reload()" style="background:#3a8a3a;border:none;border-radius:4px;padding:2px 8px;color:#fff;font-size:11px;cursor:pointer">재시작</button>`;
  document.body.appendChild(bar);
});

// ── 7세그먼트 ──────────────────────────────────────────────
const SEGS = {
  0:'abcdef', 1:'bc', 2:'abdeg', 3:'abcdg',
  4:'bcfg', 5:'acdfg', 6:'acdefg', 7:'abc',
  8:'abcdefg', 9:'abcdfg'
};
const SEG_NAMES = ['a','b','c','d','e','f','g'];
const SEG_CLASSES = {
  a:'seg seg-h seg-a', b:'seg seg-v seg-b', c:'seg seg-v seg-c',
  d:'seg seg-h seg-d', e:'seg seg-v seg-e', f:'seg seg-v seg-f', g:'seg seg-h seg-g'
};

function makeDigit() {
  const el = document.createElement('div');
  el.className = 'seg-digit';
  SEG_NAMES.forEach(s => {
    const seg = document.createElement('div');
    seg.className = SEG_CLASSES[s] + ' off';
    seg.dataset.seg = s;
    el.appendChild(seg);
  });
  return el;
}

function makePair(containerId) {
  const c = document.getElementById(containerId);
  const d1 = makeDigit(), d2 = makeDigit();
  c.appendChild(d1); c.appendChild(d2);
  return [d1, d2];
}

function setDigit(el, n) {
  const active = SEGS[n] || '';
  el.querySelectorAll('.seg').forEach(s => {
    s.classList.toggle('off', !active.includes(s.dataset.seg));
  });
}

function setNumber(pair, num) {
  const s = String(num).padStart(2, '0');
  setDigit(pair[0], parseInt(s[0]));
  setDigit(pair[1], parseInt(s[1]));
}

const dgHH = makePair('dg-hh');
const dgMM = makePair('dg-mm');
const dgSS = makePair('dg-ss');

// ── 날짜/시간 ──────────────────────────────────────────────
const DAYS = ['일','월','화','수','목','금','토'];
let showSec = true;

function updateClock() {
  const now = new Date();
  setNumber(dgHH, now.getHours());
  setNumber(dgMM, now.getMinutes());
  if (showSec) setNumber(dgSS, now.getSeconds());

  document.getElementById('date-line').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${DAYS[now.getDay()]})`;

  checkAlarms(now);
}
setInterval(updateClock, 1000);
updateClock();

// ── 탭 ────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ── 버튼 ──────────────────────────────────────────────────
let pinned = true;
document.getElementById('btn-pin').addEventListener('click', () => {
  pinned = !pinned;
  document.getElementById('btn-pin').classList.toggle('pinned', pinned);
  invoke('set_always_on_top', { onTop: pinned });
});
document.getElementById('btn-min').addEventListener('click', () => invoke('minimize_window'));
document.getElementById('btn-close').addEventListener('click', () => invoke('hide_window'));

// ── 알람 ──────────────────────────────────────────────────
let alarms = JSON.parse(localStorage.getItem('k_alarms') || '[]');

function saveAlarms() { localStorage.setItem('k_alarms', JSON.stringify(alarms)); }

window.addAlarm = function() {
  const t = document.getElementById('alarm-time').value;
  const l = document.getElementById('alarm-label').value || '알람';
  if (!t) return;
  alarms.push({ time: t, label: l, fired: false });
  saveAlarms();
  renderAlarms();
};

function renderAlarms() {
  const list = document.getElementById('alarm-list');
  list.innerHTML = alarms.map((a, i) => `
    <div class="alarm-item">
      <span>${a.time} — ${a.label}</span>
      <span class="del" onclick="removeAlarm(${i})">✕</span>
    </div>`).join('');
}

window.removeAlarm = function(i) {
  alarms.splice(i, 1);
  saveAlarms();
  renderAlarms();
};

function checkAlarms(now) {
  const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  if (now.getSeconds() !== 0) return;
  alarms.forEach((a, i) => {
    if (a.time === hhmm && !a.fired) {
      a.fired = true;
      saveAlarms();
      notify('⏰ K-Clock 알람', a.label);
      setTimeout(() => { alarms[i].fired = false; saveAlarms(); }, 61000);
    }
  });
}
renderAlarms();

// ── 카운트다운 ────────────────────────────────────────────
let cdTotal = 0, cdRemain = 0, cdTimer = null, cdRunning = false;

function cdFormat(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

window.startCountdown = function() {
  if (cdRunning) return;
  if (cdRemain === 0) {
    const h = parseInt(document.getElementById('cd-h').value) || 0;
    const m = parseInt(document.getElementById('cd-m').value) || 0;
    const s = parseInt(document.getElementById('cd-s').value) || 0;
    cdTotal = h*3600 + m*60 + s;
    cdRemain = cdTotal;
  }
  if (cdRemain <= 0) return;
  cdRunning = true;
  cdTimer = setInterval(() => {
    cdRemain--;
    document.getElementById('countdown-display').textContent = cdFormat(cdRemain);
    if (cdRemain <= 0) {
      clearInterval(cdTimer); cdRunning = false;
      notify('⏱ 카운트다운 완료', '시간이 다 됐어요!');
    }
  }, 1000);
};

window.pauseCountdown = function() {
  if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
  cdRunning = false;
};

window.resetCountdown = function() {
  window.pauseCountdown();
  cdRemain = 0;
  document.getElementById('countdown-display').textContent = '00:00:00';
};

// ── 설정 ──────────────────────────────────────────────────
window.togglePin = function() {
  const t = document.getElementById('toggle-pin');
  t.classList.toggle('on');
  pinned = t.classList.contains('on');
  document.getElementById('btn-pin').classList.toggle('pinned', pinned);
  invoke('set_always_on_top', { onTop: pinned });
};

window.toggleSec = function() {
  const t = document.getElementById('toggle-sec');
  t.classList.toggle('on');
  showSec = t.classList.contains('on');
  const ss = document.querySelectorAll('#dg-ss, #dg-ss ~ .colon');
  document.getElementById('dg-ss').parentElement.querySelectorAll('.colon:last-of-type, #dg-ss').forEach(el => {
    el.style.display = showSec ? '' : 'none';
  });
};

window.setOpacity = function(v) {
  document.getElementById('app').style.background = `rgba(10,10,10,${v/100})`;
};

// ── 업데이트 팝업 ──────────────────────────────────────────
const APP_VERSION = '1.0.7';
const CHANGELOG = {
  '1.0.7': [
    '트레이 우클릭 → 프로그램 정보 기능 추가',
    '자동 업데이트 기능 추가',
  ],
  '1.0.6': [
    '작업표시줄에서 창 닫기(✕) 버튼을 눌러도 앱이 종료되지 않고 시스템 트레이로 숨겨집니다.',
    '시스템 트레이 아이콘을 클릭하면 다시 표시됩니다.',
  ]
};

function showUpdatePopup(version) {
  const notes = CHANGELOG[version];
  if (!notes) return;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;border-radius:12px';
  const box = document.createElement('div');
  box.style.cssText = 'background:#1a1a1a;border:1px solid rgba(224,51,51,0.4);border-radius:10px;padding:18px 20px;width:260px;color:#eee;font-size:13px';
  box.innerHTML = `
    <div style="font-size:15px;font-weight:bold;color:#e03333;margin-bottom:10px">v${version} 업데이트</div>
    <ul style="padding-left:16px;line-height:1.7;color:#ccc">${notes.map(n=>`<li>${n}</li>`).join('')}</ul>
    <button onclick="this.closest('[data-overlay]').remove();localStorage.setItem('k_seen_version','${version}')"
      style="margin-top:14px;width:100%;padding:6px;background:#e03333;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer">확인</button>
  `;
  overlay.setAttribute('data-overlay','');
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}


function showInfo() {
  const ov = document.getElementById('about-overlay');
  ov.style.display = 'flex';
}

(function checkVersion() {
  const seen = localStorage.getItem('k_seen_version');
  if (seen !== APP_VERSION) showUpdatePopup(APP_VERSION);
})();
</script>

<div id="about-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:9999;align-items:center;justify-content:center;border-radius:12px">
  <div style="background:#222;border:1px solid #333;border-radius:14px;width:280px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.8);font-family:'Segoe UI','맑은 고딕',sans-serif">
    <div style="padding:14px 16px;position:relative;text-align:center;border-bottom:1px solid #2a2a2a">
      <span style="font-size:14px;font-weight:700;color:#f0f0f0">프로그램 정보</span>
      <button onclick="document.getElementById('about-overlay').style.display='none'" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:#3a3a3a;border:none;border-radius:50%;color:#aaa;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
