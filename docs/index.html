<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Clock 다운로드</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','맑은 고딕',sans-serif; background:#0f0f13; color:#e0e0e0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }

.card { background:#1a1a22; border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:48px 40px; max-width:480px; width:100%; text-align:center; }

.icon { font-size:56px; margin-bottom:20px; }
h1 { font-size:28px; font-weight:600; color:#fff; margin-bottom:8px; }
.version { font-size:13px; color:#666; margin-bottom:28px; }
.desc { font-size:14px; color:#888; line-height:1.7; margin-bottom:36px; }

.btn { display:inline-flex; align-items:center; gap:10px; background:#2c5af0; color:#fff; text-decoration:none; padding:14px 28px; border-radius:10px; font-size:15px; font-weight:500; transition:background 0.15s; margin-bottom:10px; width:100%; justify-content:center; }
.btn:hover { background:#1e44cc; }
.btn.secondary { background:rgba(255,255,255,0.06); color:#aaa; }
.btn.secondary:hover { background:rgba(255,255,255,0.1); }

.features { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:32px 0; text-align:left; }
.feat { background:rgba(255,255,255,0.04); border-radius:8px; padding:12px 14px; font-size:13px; color:#999; }
.feat strong { display:block; color:#ccc; margin-bottom:2px; font-size:12px; }

.note { font-size:12px; color:#444; margin-top:24px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🕐</div>
  <h1>K-Clock</h1>
  <div class="version">Windows 투명 플로팅 시계</div>
  <p class="desc">바탕화면 위에 항상 떠 있는 투명 디지털 시계.<br>알람, 카운트다운, 폰트·밝기 커스터마이징 지원.</p>

  <a class="btn" href="https://github.com/regina25846-code/K-clock/releases/latest/download/K-Clock_1.0.0_x64-setup.exe">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    설치파일 다운로드 (.exe)
  </a>
  <a class="btn secondary" href="https://github.com/regina25846-code/K-clock/releases/latest">
    모든 버전 보기 (GitHub)
  </a>

  <div class="features">
    <div class="feat"><strong>투명 배경</strong>바탕화면이 그대로 보임</div>
    <div class="feat"><strong>항상 위</strong>다른 창 위에 고정</div>
    <div class="feat"><strong>알람</strong>시간+이름 설정, 활성화 토글</div>
    <div class="feat"><strong>카운트다운</strong>시/분/초 타이머</div>
    <div class="feat"><strong>폰트 선택</strong>KoPubWorld 등 8종</div>
    <div class="feat"><strong>밝기·크기</strong>슬라이더로 세밀 조정</div>
  </div>

  <div class="note">Windows 10/11 64bit · 우클릭으로 메뉴 열기 · 드래그로 위치 이동</div>
</div>
</body>
</html>
