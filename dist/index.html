<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>K-Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

  html, body {
    background: transparent;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* 시계 영역 — 전체 창 = 시계 크기 */
  #clock-area {
    width: 100%;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: drag;
    cursor: move;
  }

  #clock-wrap {
    display: flex;
    align-items: center;
  }

  .digit-group { display: flex; gap: 3px; }

  /* 7세그먼트 */
  .seg-digit {
    position: relative;
    width: 22px;
    height: 40px;
  }
  .seg {
    position: absolute;
    background: #b8b8b8;
    border-radius: 1px;
    transition: opacity 0.05s;
  }
  .seg.off { opacity: 0; }
  .seg-h { width: 16px; height: 3px; left: 3px; }
  .seg-v { width: 3px; height: 14px; }
  .seg-a { top: 0; }
  .seg-b { top: 3px; right: 0; }
  .seg-c { bottom: 3px; right: 0; }
  .seg-d { bottom: 0; }
  .seg-e { bottom: 3px; left: 0; }
  .seg-f { top: 3px; left: 0; }
  .seg-g { top: 18px; }

  /* 콜론 */
  .colon {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    padding: 0 5px;
    padding-bottom: 3px;
    -webkit-app-region: drag;
  }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #b8b8b8;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* 패널 영역 — 시계 아래 */
  #panel-area {
    display: none;
    padding: 0 8px 8px 8px;
    -webkit-app-region: no-drag;
  }

  .panel {
    background: rgba(20, 20, 20, 0.95);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 12px 14px;
    position: relative;
  }

  .panel-title {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-transform: uppercase;
    font-family: 'Segoe UI', sans-serif;
  }

  .close-panel {
    position: absolute;
    top: 8px; right: 10px;
    background: none; border: none;
    color: rgba(255,255,255,0.25);
    font-size: 13px; cursor: pointer;
  }
  .close-panel:hover { color: rgba(255,255,255,0.6); }

  /* 우클릭 메뉴 */
  #ctx-menu {
    display: none;
    position: fixed;
    background: rgba(22, 22, 22, 0.97);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 9px;
    padding: 5px 0;
    z-index: 9999;
    min-width: 130px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.7);
    -webkit-app-region: no-drag;
  }
  .menu-item {
    padding: 7px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    font-family: '맑은 고딕', 'Segoe UI', sans-serif;
  }
  .menu-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .menu-sep { height: 1px; background: rgba(255,255,255,0.07); margin: 3px 0; }
  .menu-item.danger { color: rgba(255,80,80,0.75); }
  .menu-item.danger:hover { color: #ff5050; }

  /* 공통 입력 */
  input[type="time"], input[type="text"], input[type="number"] {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px;
    color: #ddd;
    padding: 4px 7px;
    font-size: 12px;
    outline: none;
    font-family: '맑은 고딕', sans-serif;
  }
  input:focus { border-color: rgba(200,200,200,0.35); }
  .row { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
  .btn-sm {
    padding: 4px 10px; border: none; border-radius: 5px;
    font-size: 11px; cursor: pointer; font-family: '맑은 고딕', sans-serif;
  }
  .btn-white { background: rgba(255,255,255,0.11); color: #ccc; }
  .btn-white:hover { background: rgba(255,255,255,0.18); }
  .btn-ghost { background: rgba(255,255,255,0.05); color: #888; }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); }

  #alarm-list { max-height: 70px; overflow-y: auto; }
  .alarm-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 3px 0; font-size: 11px; color: #aaa;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: '맑은 고딕', sans-serif;
  }
  .alarm-del { color: rgba(255,80,80,0.5); cursor: pointer; }
  .alarm-del:hover { color: #ff5050; }

  #cd-display {
    font-size: 22px; color: #ccc; text-align: center;
    margin: 8px 0; letter-spacing: 2px;
    font-family: 'Consolas', monospace; font-weight: 300;
  }
  .cd-btns { display: flex; gap: 5px; justify-content: center; }

  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px; color: #bbb; font-family: '맑은 고딕', sans-serif;
  }
  .toggle {
    width: 30px; height: 16px; background: #333; border-radius: 8px;
    position: relative; cursor: pointer; transition: background 0.2s;
  }
  .toggle.on { background: #777; }
  .toggle::after {
    content: ''; position: absolute;
    width: 12px; height: 12px; background: #fff; border-radius: 50%;
    top: 2px; left: 2px; transition: left 0.2s;
  }
  .toggle.on::after { left: 16px; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
</style>
</head>
<body>

<div id="clock-area">
  <div id="clock-wrap">
    <div class="digit-group" id="dg-hh"></div>
    <div class="colon"><div class="dot"></div><div class="dot"></div></div>
    <div class="digit-group" id="dg-mm"></div>
    <div class="colon" id="ss-colon"><div class="dot"></div><div class="dot"></div></div>
    <div class="digit-group" id="dg-ss"></div>
  </div>
</div>

<div id="panel-area">
  <!-- 알람 -->
  <div class="panel" id="panel-alarm" style="display:none">
    <div class="panel-title">알람</div>
    <button class="close-panel" onclick="closePanel()">✕</button>
    <div class="row">
      <input type="time" id="alarm-time" value="07:00">
      <input type="text" id="alarm-label" placeholder="이름" style="flex:1">
      <button class="btn-sm btn-white" onclick="addAlarm()">추가</button>
    </div>
    <div id="alarm-list"></div>
  </div>

  <!-- 카운트다운 -->
  <div class="panel" id="panel-countdown" style="display:none">
    <div class="panel-title">카운트다운</div>
    <button class="close-panel" onclick="closePanel()">✕</button>
    <div class="row" style="justify-content:center;gap:4px">
      <input type="number" id="cd-h" placeholder="시" min="0" max="99" style="width:42px;text-align:center">
      <span style="color:#444">:</span>
      <input type="number" id="cd-m" placeholder="분" min="0" max="59" style="width:42px;text-align:center">
      <span style="color:#444">:</span>
      <input type="number" id="cd-s" placeholder="초" min="0" max="59" style="width:42px;text-align:center">
    </div>
    <div id="cd-display">00:00:00</div>
    <div class="cd-btns">
      <button class="btn-sm btn-white" onclick="startCd()">시작</button>
      <button class="btn-sm btn-ghost" onclick="pauseCd()">일시정지</button>
      <button class="btn-sm btn-ghost" onclick="resetCd()">초기화</button>
    </div>
  </div>

  <!-- 설정 -->
  <div class="panel" id="panel-settings" style="display:none">
    <div class="panel-title">설정</div>
    <button class="close-panel" onclick="closePanel()">✕</button>
    <div class="setting-row">
      <span>항상 위</span>
      <div class="toggle on" id="tog-pin" onclick="togglePin()"></div>
    </div>
    <div class="setting-row">
      <span>초 표시</span>
      <div class="toggle on" id="tog-sec" onclick="toggleSec()"></div>
    </div>
    <div class="setting-row">
      <span>숫자 밝기</span>
      <input type="range" min="60" max="255" value="184" id="brightness-slider"
        style="width:80px;accent-color:#888"
        oninput="setBrightness(this.value)">
    </div>
  </div>
</div>

<!-- 우클릭 메뉴 -->
<div id="ctx-menu">
  <div class="menu-item" onclick="openPanel('alarm')">⏰ 알람</div>
  <div class="menu-item" onclick="openPanel('countdown')">⏱ 카운트다운</div>
  <div class="menu-item" onclick="openPanel('settings')">⚙ 설정</div>
  <div class="menu-sep"></div>
  <div class="menu-item" onclick="invoke('minimize_window')">— 최소화</div>
  <div class="menu-item danger" onclick="invoke('close_app')">✕ 종료</div>
</div>

<script>
const invoke = (...a) => window.__TAURI__?.core?.invoke(...a) ?? Promise.resolve();

function setWinHeight(h) {
  invoke('set_window_height', { height: h });
}

// ── 7세그먼트 ──────────────────────────────────────────────
const SEGS = {
  0:'abcdef',1:'bc',2:'abdeg',3:'abcdg',
  4:'bcfg',5:'acdfg',6:'acdefg',7:'abc',
  8:'abcdefg',9:'abcdfg'
};
const SEG_CLS = {
  a:'seg seg-h seg-a',b:'seg seg-v seg-b',c:'seg seg-v seg-c',
  d:'seg seg-h seg-d',e:'seg seg-v seg-e',f:'seg seg-v seg-f',g:'seg seg-h seg-g'
};
function makeDigit() {
  const el = document.createElement('div');
  el.className = 'seg-digit';
  'abcdefg'.split('').forEach(s => {
    const seg = document.createElement('div');
    seg.className = SEG_CLS[s]+' off';
    seg.dataset.seg = s;
    el.appendChild(seg);
  });
  return el;
}
function makePair(id) {
  const c = document.getElementById(id);
  const d1 = makeDigit(), d2 = makeDigit();
  c.appendChild(d1); c.appendChild(d2);
  return [d1, d2];
}
function setDigit(el, n) {
  const on = SEGS[n]||'';
  el.querySelectorAll('.seg').forEach(s => s.classList.toggle('off', !on.includes(s.dataset.seg)));
}
function setNum(pair, num) {
  const s = String(num).padStart(2,'0');
  setDigit(pair[0],+s[0]); setDigit(pair[1],+s[1]);
}
const dgH = makePair('dg-hh');
const dgM = makePair('dg-mm');
const dgS = makePair('dg-ss');

// ── 시계 ──────────────────────────────────────────────────
let showSec = true;
function updateClock() {
  const now = new Date();
  setNum(dgH, now.getHours());
  setNum(dgM, now.getMinutes());
  if (showSec) setNum(dgS, now.getSeconds());
  checkAlarms(now);
}
setInterval(updateClock, 1000);
updateClock();

// ── 패널 (창 높이 동적 조절) ──────────────────────────────
const PANEL_HEIGHTS = { alarm: 230, countdown: 220, settings: 210 };
const CLOCK_H = 90;

function openPanel(name) {
  closeCtxMenu();
  document.querySelectorAll('#panel-area .panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-' + name).style.display = 'block';
  document.getElementById('panel-area').style.display = 'block';
  setWinHeight(CLOCK_H + (PANEL_HEIGHTS[name] || 200));
}
function closePanel() {
  document.getElementById('panel-area').style.display = 'none';
  document.querySelectorAll('#panel-area .panel').forEach(p => p.style.display = 'none');
  setWinHeight(CLOCK_H);
}

// ── 우클릭 메뉴 ──────────────────────────────────────────
const ctxMenu = document.getElementById('ctx-menu');
document.addEventListener('contextmenu', e => {
  e.preventDefault();
  ctxMenu.style.display = 'block';
  let x = e.clientX, y = e.clientY;
  if (x + 140 > window.innerWidth) x = window.innerWidth - 140;
  if (y + 180 > window.innerHeight) y = Math.max(0, e.clientY - 180);
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top = y + 'px';
});
document.addEventListener('click', e => { if (!ctxMenu.contains(e.target)) closeCtxMenu(); });
function closeCtxMenu() { ctxMenu.style.display = 'none'; }

// ── 설정 ──────────────────────────────────────────────────
let pinned = true;
function togglePin() {
  const t = document.getElementById('tog-pin');
  t.classList.toggle('on');
  pinned = t.classList.contains('on');
  invoke('set_always_on_top', { onTop: pinned });
}
function toggleSec() {
  const t = document.getElementById('tog-sec');
  t.classList.toggle('on');
  showSec = t.classList.contains('on');
  document.getElementById('dg-ss').style.display = showSec ? '' : 'none';
  document.getElementById('ss-colon').style.display = showSec ? '' : 'none';
}
function setBrightness(v) {
  const c = Math.round(v);
  const color = `rgb(${c},${c},${c})`;
  document.querySelectorAll('.seg:not(.off)').forEach(s => s.style.background = color);
  document.querySelectorAll('.dot').forEach(d => d.style.background = color);
}

// ── 알람 ──────────────────────────────────────────────────
let alarms = JSON.parse(localStorage.getItem('k_alarms')||'[]');
function saveAlarms() { localStorage.setItem('k_alarms', JSON.stringify(alarms)); }
window.addAlarm = function() {
  const t = document.getElementById('alarm-time').value;
  const l = document.getElementById('alarm-label').value || '알람';
  if (!t) return;
  alarms.push({time:t,label:l,fired:false});
  saveAlarms(); renderAlarms();
};
function renderAlarms() {
  document.getElementById('alarm-list').innerHTML = alarms.map((a,i) =>
    `<div class="alarm-item"><span>${a.time} · ${a.label}</span><span class="alarm-del" onclick="removeAlarm(${i})">✕</span></div>`
  ).join('');
}
window.removeAlarm = function(i) { alarms.splice(i,1); saveAlarms(); renderAlarms(); };
function checkAlarms(now) {
  if (now.getSeconds()!==0) return;
  const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  alarms.forEach((a,i) => {
    if (a.time===hhmm && !a.fired) {
      a.fired=true; saveAlarms();
      alert(`⏰ ${a.label}`);
      setTimeout(()=>{alarms[i].fired=false;saveAlarms();},61000);
    }
  });
}
renderAlarms();

// ── 카운트다운 ────────────────────────────────────────────
let cdRemain=0, cdTimer=null, cdRunning=false;
function cdFmt(s) {
  return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
window.startCd = function() {
  if (cdRunning) return;
  if (cdRemain===0) {
    cdRemain=(parseInt(document.getElementById('cd-h').value)||0)*3600
            +(parseInt(document.getElementById('cd-m').value)||0)*60
            +(parseInt(document.getElementById('cd-s').value)||0);
  }
  if (cdRemain<=0) return;
  cdRunning=true;
  cdTimer=setInterval(()=>{
    cdRemain--;
    document.getElementById('cd-display').textContent=cdFmt(cdRemain);
    if (cdRemain<=0){clearInterval(cdTimer);cdRunning=false;alert('⏱ 카운트다운 완료!');}
  },1000);
};
window.pauseCd = function(){clearInterval(cdTimer);cdTimer=null;cdRunning=false;};
window.resetCd = function(){window.pauseCd();cdRemain=0;document.getElementById('cd-display').textContent='00:00:00';};
</script>
</body>
</html>
