<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로그램 정보</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:320px; height:360px; background:transparent; overflow:hidden; font-family:"Malgun Gothic","Apple SD Gothic Neo","Segoe UI",sans-serif; }
  .dialog {
    width:320px; height:360px;
    background:#FFFFFF;
    border-radius:14px;
    border:1px solid #DDDDDD;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .header {
    position:relative; display:flex; align-items:center; justify-content:center;
    padding:14px 16px; border-bottom:1px solid #EEEEEE;
    flex-shrink:0;
    -webkit-app-region: drag;
  }
  .header-title { font-size:14px; font-weight:700; color:#111111; }
  .close-btn {
    position:absolute; right:12px;
    width:22px; height:22px; border-radius:11px;
    background:#E5E5E5; color:#555555; font-size:11px;
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    -webkit-app-region: no-drag;
  }
  .close-btn:hover { background:#E74C3C; color:#FFFFFF; }
  .body {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:20px 24px; text-align:center;
  }
  .icon { width:84px; height:84px; border-radius:50%; margin-bottom:16px; object-fit:cover; }
  .appname { font-size:18px; font-weight:900; color:#111111; margin-bottom:4px; }
  .version { font-size:12px; color:#999999; margin-bottom:16px; }
  .divider { width:100%; height:1px; background:#EEEEEE; margin-bottom:14px; }
  .desc { font-size:13px; color:#333333; line-height:1.8; margin-bottom:14px; }
  .copy { font-size:11px; color:#AAAAAA; }
</style>
</head>
