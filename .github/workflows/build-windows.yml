name: Build K-Clock

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install JS dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Get version
        id: ver
        shell: bash
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $GITHUB_OUTPUT

      - name: Create update/latest.json
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SIG=$(cat src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig 2>/dev/null || cat src-tauri/target/release/bundle/nsis/*.nsis.zip.sig 2>/dev/null || echo "")
          URL="https://github.com/regina25846-code/K-clock/releases/download/v${VERSION}/K-Clock_${VERSION}_x64-setup.nsis.zip"
          mkdir -p update
          printf '{\n  "version": "%s",\n  "notes": "K-Clock v%s",\n  "pub_date": "%s",\n  "platforms": {\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "%s"\n    }\n  }\n}\n' \
            "$VERSION" "$VERSION" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$SIG" "$URL" > update/latest.json
          cat update/latest.json

      - name: Commit update/latest.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update/latest.json
          git diff --staged --quiet || git commit -m "chore: K-Clock v${{ steps.ver.outputs.version }} 업데이트 정보"
          git push || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: K-Clock-${{ steps.ver.outputs.version }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: K-Clock v${{ steps.ver.outputs.version }}
          body: K-Clock v${{ steps.ver.outputs.version }} 릴리즈
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          fail_on_unmatched_files: false

      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
